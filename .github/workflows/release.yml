name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            **One-liner:**
            ```bash
            curl -fsSL https://hermeticsys.com/install.sh | sh
            ```

            **Quick start:**
            ```bash
            hermetic init --quickstart
            ```

            Binary artifacts are uploaded separately by the maintainer.
            Verify integrity with SHA256SUMS in the release assets.
